services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      NODE_ENV: production
      PORT: 3030
      DATABASE_URL: postgres://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dashboard}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env (min 16 random characters)}
      UPLOAD_DIR: /app/data/uploads
      BACKUP_DIR: /app/data/backups
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/data/uploads
      - backups_data:/app/data/backups

volumes:
  postgres_data:
  uploads_data:
  backups_data:
