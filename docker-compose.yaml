services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3030"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3030}
      DATABASE_URL: ${DATABASE_URL:-postgres://dashboard:dashboard@db:5432/dashboard}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-secret-in-production}
      NEXT_PUBLIC_USE_MOCK_DATA: ${NEXT_PUBLIC_USE_MOCK_DATA:-false}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/data/uploads}
      BACKUP_DIR: ${BACKUP_DIR:-/app/data/backups}
    volumes:
      - uploads_data:/app/data/uploads
      - backups_data:/app/data/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
  backups_data:
